name: Build and Release Modpack

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number for this release"
        required: true
        default: "0.1.0"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ">=1.19.0"
          cache: false

      - name: Install Packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "Verifying packwiz installation:"
          packwiz --help | head -n 3

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          else
            # Use current date and short commit hash for dev builds
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            VERSION="$(date +'%Y%m%d')-${SHORT_SHA}"
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Mods List & Create CurseForge Modpack
        run: |
          echo "Building modpack via src/build.go..."
          # Pass the pack name config to github actions
          PACK_NAME=$(grep -m 1 "^name = " pack.toml | cut -d'"' -f2)
          echo "PACK_NAME=${PACK_NAME}" >> $GITHUB_ENV

          go run ./src
          go run ./src -server

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ env.PACK_NAME }} v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          body: |
            ## ${{ env.PACK_NAME }} v${{ env.VERSION }}

            ### Supported Versions
            - **Minecraft:** ${{ env.MC_VER }}
            - **NeoForge:** ${{ env.NEOFORGE_VER }}

            ### Installation
            1. Download the CurseForge App from https://www.curseforge.com/download/app
            2. Click "Create Custom Profile" → "Import"
            3. Select the downloaded ZIP file

            ### Memory Allocation
            It's recommended to allocate at least 4GB to 6GB of RAM for the best experience.
            - In the CurseForge App, click the **Settings** gear (bottom left).
            - Go to **Minecraft** under "Game Specific".
            - Scroll down to **Java Settings** and set the "Allocated Memory" slider to at least 4096 MB.

            ### Full Changelog
            https://github.com/filipjaruska/minecraft-mods/commits/v${{ env.VERSION }}

            ### Mods
            This modpack contains ${{ env.MOD_COUNT }} mods. See the attached mods_list.txt for the complete list.
          files: |
            *.zip
            mods_list.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
